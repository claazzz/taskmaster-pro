<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TaskMaster Pro</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container mt-5">
        <h1 class="text-center mb-4">🚀 TaskMaster Pro</h1>

        <!-- Блок авторизации -->
        <div id="auth-section" class="card p-4 mb-4">
            <h3>Авторизация</h3>
            <div class="row">
                <div class="col-md-6">
                    <h5>Регистрация</h5>
                    <input id="reg-username" class="form-control mb-2" placeholder="Логин">
                    <input id="reg-email" class="form-control mb-2" placeholder="Email">
                    <input id="reg-password" class="form-control mb-2" type="password" placeholder="Пароль">
                    <button id="register-btn" class="btn btn-primary">Зарегистрироваться</button>
                </div>
                <div class="col-md-6">
                    <h5>Вход</h5>
                    <input id="login-username" class="form-control mb-2" placeholder="Логин">
                    <input id="login-password" class="form-control mb-2" type="password" placeholder="Пароль">
                    <button id="login-btn" class="btn btn-success">Войти</button>
                </div>
            </div>
            <div id="auth-message" class="mt-2"></div>
        </div>

        <!-- Блок задач (показывается после входа) -->
        <div id="tasks-section" style="display: none;">
            <div class="card p-4 mb-4">
                <h3>Новая задача</h3>
                <div class="row">
                    <div class="col-md-4">
                        <input id="task-title" class="form-control" placeholder="Название">
                    </div>
                    <div class="col-md-4">
                        <input id="task-desc" class="form-control" placeholder="Описание">
                    </div>
                    <div class="col-md-3">
                        <select id="task-priority" class="form-control">
                            <option value="low">Низкий</option>
                            <option value="medium" selected>Средний</option>
                            <option value="high">Высокий</option>
                        </select>
                    </div>
                    <div class="col-md-1">
                        <button id="add-task-btn" class="btn btn-primary">➕</button>
                    </div>
                </div>
            </div>

            <div class="row">
                <div class="col-md-8">
                    <h3>Мои задачи</h3>
                    <ul id="task-list" class="list-group"></ul>
                </div>
                <div class="col-md-4">
                    <h3>📊 Аналитика</h3>
                    <div id="analytics" class="card p-3"></div>
                    <button id="refresh-analytics-btn" class="btn btn-secondary mt-2">Обновить аналитику</button>
                </div>
            </div>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
